<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Buttoned Up</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #ffd6e8 0, transparent 35%),
        radial-gradient(circle at bottom right, #b6f0ff 0, transparent 35%),
        linear-gradient(135deg, #fff8ef, #fff0f7);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #22223b;
      padding: 24px;
    }

    .box {
      background: rgba(255, 255, 255, 0.92);
      padding: 44px 34px;
      border-radius: 34px;
      box-shadow: 0 24px 55px rgba(34, 34, 59, 0.18);
      max-width: 560px;
      border: 2px solid white;
    }

    h1 {
      font-size: clamp(38px, 7vw, 62px);
      margin: 0 0 14px;
      color: #ff2f8f;
      text-shadow: 3px 3px 0 #ffe66d;
    }

    p {
      font-size: 19px;
      line-height: 1.7;
      margin: 0;
      color: #4a4e69;
    }

    a {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 24px;
      background: linear-gradient(135deg, #ff2f8f, #b388ff);
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 900;
      box-shadow: 0 14px 26px rgba(255, 47, 143, 0.35);
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Thank You! 💖</h1>
    <p>
      Your message has been sent to Buttoned Up.
      We will get back to you soon.
    </p>

    <a href="https://buttoned-up.github.io/2026/">Back to Home</a>
  </div>
</body>
</html>
